services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: blazemoney-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY_1
        sync: false
      - key: OPENROUTER_API_KEY_2
        sync: false
      - key: OPENROUTER_API_KEY_3
        sync: false

  # ── Frontend ─────────────────────────────────────────────────────────────────
  - type: web
    name: blazemoney
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://blazemoney-1.onrender.com
      - key: NODE_VERSION
        value: 20.11.0
